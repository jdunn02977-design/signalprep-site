	<!DOCTYPE html>
<html>
<head>
  <title>Signal Quiz</title>
  <style>
    body { font-family: Arial; background: #0f172a; color: white; text-align: center; }
    .btn { padding: 10px; margin: 10px; background: #1e293b; border: 1px solid white; color: white; cursor: pointer; border-radius: 8px; }
  </style>
</head>
<body>

<h2>Signal: 🟡 over 🔴</h2>
<p>What is this signal?</p>

<button class="btn" onclick="check('Approach')">Approach</button>
<button class="btn" onclick="check('Clear')">Clear</button>
<button class="btn" onclick="check('Restricting')">Restricting</button>

<p id="result"></p>

<script>
function check(answer) {
  if(answer === "Approach") {
    document.getElementById("result").innerText = "✅ Correct!";
  } else {
    document.getElementById("result").innerText = "❌ Wrong";
  }
}
</script>

</body>
</html>
